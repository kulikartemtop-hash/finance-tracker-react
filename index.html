<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#007aff">
    <title>Мои Финансы</title>
    <link rel="stylesheet" href="style.css">
    <!-- Библиотека для распознавания текста (OCR) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <h1>💰 Мои Финансы</h1>
            <div class="balance-card">
                <span>Общий расход</span>
                <h2 id="totalBalance">0.00 ₽</h2>
            </div>
        </header>

        <div class="card">
            <h3>📸 Добавить расход</h3>
            
            <!-- capture="environment" автоматически открывает заднюю камеру на телефоне -->
            <input type="file" id="cameraInput" accept="image/*" capture="environment">
            <button class="btn-scan" id="scanBtn">Сканировать чек</button>
            
            <div id="loading" class="loading" style="display: none;">
                ⏳ Распознаю текст... <span id="progress">0</span>%
            </div>

            <div class="input-group">
                <input type="number" id="amountInput" placeholder="Сумма (₽)" step="0.01">
                <input type="text" id="descInput" placeholder="Описание (например: Продукты)">
                <button class="btn-add" id="addBtn">Добавить</button>
            </div>
        </div>

        <div class="card">
            <h3>📜 История операций</h3>
            <ul id="transactionList" class="transaction-list">
                <!-- Сюда будут добавляться транзакции через JS -->
            </ul>
            <p id="emptyState" class="empty-state">Пока нет операций. Отсканируйте чек!</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
